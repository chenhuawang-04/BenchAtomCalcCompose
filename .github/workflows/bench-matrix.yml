name: bench-matrix

on:
  workflow_dispatch:
    inputs:
      sizes:
        description: "Vector sizes (comma-separated)"
        required: false
        default: "65536,262144"
      blocks:
        description: "Block sizes (comma-separated)"
        required: false
        default: "128,256"
      target_ms:
        description: "Target milliseconds per case"
        required: false
        default: "120"
      repeats:
        description: "Outer repeat runs (stability)"
        required: false
        default: "3"
      run_arity_suite:
        description: "Run arity 1..10 complex suite"
        required: false
        type: boolean
        default: true
      arity_suite_max:
        description: "Max arity for suite"
        required: false
        default: "10"
      include_macos13:
        description: "Include macOS 13 x64 runner in manual runs"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bench:
    name: bench-${{ matrix.os }}-${{ matrix.arch }}
    if: ${{ matrix.os != 'macos-13' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.include_macos13) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-14
            arch: arm64
          - os: macos-13
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure (Release, reproducible)
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DBENCHCALC_ENABLE_FAST_MATH=OFF
          -DBENCHCALC_ENABLE_LLVM_JIT=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run benchmark matrix
        shell: pwsh
        run: |
          $candidates = @(
            "build/benchcalc",
            "build/benchcalc.exe",
            "build/Release/benchcalc.exe"
          )
          $exe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) {
            throw "benchcalc executable not found in known output paths."
          }

          $sizes = "${{ github.event.inputs.sizes }}"
          if ([string]::IsNullOrWhiteSpace($sizes)) {
            $sizes = "65536,262144"
          }
          $blocks = "${{ github.event.inputs.blocks }}"
          if ([string]::IsNullOrWhiteSpace($blocks)) {
            $blocks = "128,256"
          }
          $targetMs = "${{ github.event.inputs.target_ms }}"
          if ([string]::IsNullOrWhiteSpace($targetMs)) {
            $targetMs = "120"
          }
          $repeats = "${{ github.event.inputs.repeats }}"
          if ([string]::IsNullOrWhiteSpace($repeats)) {
            $repeats = "3"
          }
          $runAritySuite = "${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_arity_suite) }}"
          if ([string]::IsNullOrWhiteSpace($runAritySuite)) {
            $runAritySuite = "true"
          }
          $aritySuiteMax = "${{ github.event.inputs.arity_suite_max }}"
          if ([string]::IsNullOrWhiteSpace($aritySuiteMax)) {
            $aritySuiteMax = "10"
          }

          & $exe `
            --expr "a+b*c/d" `
            --sizes $sizes `
            --blocks $blocks `
            --warmup 3 `
            --target-ms $targetMs `
            --max-auto-iters 128 `
            --datasets 3 `
            --repeats $repeats `
            --backend std `
            --no-vm `
            --no-llvm-jit `
            --csv "bench_bin_${{ matrix.os }}_${{ matrix.arch }}.csv" `
            --json "bench_bin_${{ matrix.os }}_${{ matrix.arch }}.json"

          & $exe `
            --expr "a+b-sin(c)" `
            --sizes $sizes `
            --blocks $blocks `
            --warmup 3 `
            --target-ms $targetMs `
            --max-auto-iters 128 `
            --datasets 3 `
            --repeats $repeats `
            --backend std `
            --no-vm `
            --no-llvm-jit `
            --csv "bench_mix_${{ matrix.os }}_${{ matrix.arch }}.csv" `
            --json "bench_mix_${{ matrix.os }}_${{ matrix.arch }}.json"

          if ($runAritySuite -eq "true") {
            & $exe `
              --arity-suite-max $aritySuiteMax `
              --arity-suite-mode complex `
              --sizes $sizes `
              --blocks $blocks `
              --warmup 2 `
              --target-ms $targetMs `
              --max-auto-iters 96 `
              --datasets 2 `
              --repeats $repeats `
              --backend std `
              --no-vm `
              --no-llvm-jit `
              --csv "bench_arity_${{ matrix.os }}_${{ matrix.arch }}.csv" `
              --json "bench_arity_${{ matrix.os }}_${{ matrix.arch }}.json"
          }

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v5
        with:
          name: bench-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            bench_bin_${{ matrix.os }}_${{ matrix.arch }}.csv
            bench_bin_${{ matrix.os }}_${{ matrix.arch }}.json
            bench_mix_${{ matrix.os }}_${{ matrix.arch }}.csv
            bench_mix_${{ matrix.os }}_${{ matrix.arch }}.json
            bench_arity_${{ matrix.os }}_${{ matrix.arch }}.csv
            bench_arity_${{ matrix.os }}_${{ matrix.arch }}.json
          retention-days: 30
          if-no-files-found: warn

      - name: Bench summary
        shell: pwsh
        run: |
          function Get-BestLine($csvPath) {
            $rows = Import-Csv $csvPath
            if (-not $rows -or $rows.Count -eq 0) {
              throw "No rows in $csvPath"
            }
            return $rows | Sort-Object {[double]$_.median_ns} | Select-Object -First 1
          }

          $binCsv = "bench_bin_${{ matrix.os }}_${{ matrix.arch }}.csv"
          $mixCsv = "bench_mix_${{ matrix.os }}_${{ matrix.arch }}.csv"
          if (-not (Test-Path $binCsv) -or -not (Test-Path $mixCsv)) {
            throw "Expected benchmark CSV files not found."
          }

          $bestBin = Get-BestLine $binCsv
          $bestMix = Get-BestLine $mixCsv

          $summary = @()
          $summary += "### Bench Summary (${{ matrix.os }}-${{ matrix.arch }})"
          $summary += ""
          $summary += "| Case | Best Variant | Median(ns) | Verify |"
          $summary += "|---|---|---:|---:|"
          $summary += "| a+b*c/d | $($bestBin.variant) | $($bestBin.median_ns) | $($bestBin.verified) |"
          $summary += "| a+b-sin(c) | $($bestMix.variant) | $($bestMix.median_ns) | $($bestMix.verified) |"

          $arityCsv = "bench_arity_${{ matrix.os }}_${{ matrix.arch }}.csv"
          if (Test-Path $arityCsv) {
            $arityRows = Import-Csv $arityCsv
            if ($arityRows -and $arityRows.Count -gt 0) {
              $bestArity = $arityRows | Sort-Object {[double]$_.median_ns} | Select-Object -First 1
              $arityExprCount = ($arityRows.expression | Sort-Object -Unique).Count
              $summary += "| arity-suite(1..10 complex) | $($bestArity.variant) | $($bestArity.median_ns) | $($bestArity.verified) |"
              $summary += ""
              $summary += "Arity suite expressions: $arityExprCount"
            }
          }

          $summary += ""
          $sizes = "${{ github.event.inputs.sizes }}"
          if ([string]::IsNullOrWhiteSpace($sizes)) { $sizes = "65536,262144" }
          $blocks = "${{ github.event.inputs.blocks }}"
          if ([string]::IsNullOrWhiteSpace($blocks)) { $blocks = "128,256" }
          $targetMs = "${{ github.event.inputs.target_ms }}"
          if ([string]::IsNullOrWhiteSpace($targetMs)) { $targetMs = "120" }
          $repeats = "${{ github.event.inputs.repeats }}"
          if ([string]::IsNullOrWhiteSpace($repeats)) { $repeats = "3" }
          $runAritySuite = "${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_arity_suite) }}"
          if ([string]::IsNullOrWhiteSpace($runAritySuite)) { $runAritySuite = "true" }
          $aritySuiteMax = "${{ github.event.inputs.arity_suite_max }}"
          if ([string]::IsNullOrWhiteSpace($aritySuiteMax)) { $aritySuiteMax = "10" }
          $summary += "Config: sizes=$sizes, blocks=$blocks, target-ms=$targetMs, repeats=$repeats, arity-suite=$runAritySuite(max=$aritySuiteMax)"
          $summary -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
