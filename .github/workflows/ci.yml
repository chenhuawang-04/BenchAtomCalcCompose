name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-smoke:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-14
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure (Release, portable)
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DBENCHCALC_ENABLE_FAST_MATH=OFF
          -DBENCHCALC_ENABLE_LLVM_JIT=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run smoke benchmark
        shell: pwsh
        run: |
          $candidates = @(
            "build/benchcalc",
            "build/benchcalc.exe",
            "build/Release/benchcalc.exe"
          )
          $exe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) {
            throw "benchcalc executable not found in known output paths."
          }

          & $exe `
            --expr "a+b-sin(c)" `
            --sizes 4096 `
            --blocks 128 `
            --warmup 2 `
            --iters 5 `
            --datasets 2 `
            --backend std `
            --no-vm `
            --no-llvm-jit `
            --no-verify `
            --csv "smoke_${{ matrix.os }}_${{ matrix.arch }}.csv"

          & $exe `
            --arity-suite-max 10 `
            --arity-suite-mode complex `
            --sizes 1024 `
            --blocks 128 `
            --warmup 1 `
            --iters 2 `
            --datasets 1 `
            --backend std `
            --no-vm `
            --no-llvm-jit `
            --no-verify `
            --csv "smoke_arity_${{ matrix.os }}_${{ matrix.arch }}.csv"

      - name: Upload smoke artifact
        uses: actions/upload-artifact@v5
        with:
          name: smoke-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            smoke_${{ matrix.os }}_${{ matrix.arch }}.csv
            smoke_arity_${{ matrix.os }}_${{ matrix.arch }}.csv
          retention-days: 14

      - name: Smoke summary
        shell: pwsh
        run: |
          function Import-NonEmptyCsv([string]$path) {
            if (-not (Test-Path $path)) {
              throw "CSV not found: $path"
            }
            $rows = Import-Csv $path
            if (-not $rows -or $rows.Count -eq 0) {
              throw "CSV has no rows: $path"
            }
            return $rows
          }

          $coreCsv = "smoke_${{ matrix.os }}_${{ matrix.arch }}.csv"
          $arityCsv = "smoke_arity_${{ matrix.os }}_${{ matrix.arch }}.csv"

          $coreRows = Import-NonEmptyCsv $coreCsv
          $arityRows = Import-NonEmptyCsv $arityCsv

          $arityExprCount = ($arityRows.expression | Sort-Object -Unique).Count
          if ($arityRows.Count -lt 200) {
            throw "Arity suite rows unexpectedly low: expected >=200, actual=$($arityRows.Count)"
          }

          $coreBest = $coreRows | Sort-Object {[double]$_.median_ns} | Select-Object -First 1
          $arityBest = $arityRows | Sort-Object {[double]$_.median_ns} | Select-Object -First 1

          $summary = @()
          $summary += "### Smoke Summary (${{ matrix.os }}-${{ matrix.arch }})"
          $summary += ""
          $summary += "| Case | Best Variant | Median(ns) | Verify | Rows |"
          $summary += "|---|---|---:|---:|---:|"
          $summary += "| core: a+b-sin(c) | $($coreBest.variant) | $($coreBest.median_ns) | $($coreBest.verified) | $($coreRows.Count) |"
          $summary += "| arity suite: 1..10 complex | $($arityBest.variant) | $($arityBest.median_ns) | $($arityBest.verified) | $($arityRows.Count) |"
          $summary += ""
          $summary += "Arity expressions covered: $arityExprCount"
          $summary -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
